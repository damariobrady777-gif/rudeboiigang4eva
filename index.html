<!DOCTYPE html>
<html>
<head>

<title>RudeBoiiGang4eva</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>
body{margin:0;overflow:hidden;background:black;}
</style>

</head>

<body>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,10,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

const groundGeo = new THREE.PlaneGeometry(500,500);
const groundMat = new THREE.MeshStandardMaterial({color:0x222222});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// city buildings
for(let i=0;i<200;i++){

let height=Math.random()*20+5;

let geo=new THREE.BoxGeometry(5,height,5);
let mat=new THREE.MeshStandardMaterial({
color:Math.random()*0xffffff
});

let building=new THREE.Mesh(geo,mat);

building.position.x=(Math.random()-0.5)*200;
building.position.z=(Math.random()-0.5)*200;
building.position.y=height/2;

scene.add(building);

}


// coin characters

function createCoin(color){

let geo=new THREE.CylinderGeometry(2,2,.5,32);

let mat=new THREE.MeshStandardMaterial({
color:color,
metalness:1,
roughness:0.3
});

let coin=new THREE.Mesh(geo,mat);
coin.rotation.x=Math.PI/2;

scene.add(coin);

return coin;

}

const rudeBabie=createCoin(0xff0000);
rudeBabie.position.set(-5,2,0);

const crystal=createCoin(0x00ff00);
crystal.position.set(0,2,0);

const godBody=createCoin(0x0000ff);
godBody.position.set(5,2,0);


// zombies

let zombies=[];

function createZombie(){

let geo=new THREE.SphereGeometry(1,16,16);
let mat=new THREE.MeshStandardMaterial({color:0x00ff00});

let zombie=new THREE.Mesh(geo,mat);

zombie.position.x=(Math.random()-0.5)*100;
zombie.position.z=(Math.random()-0.5)*100;
zombie.position.y=1;

scene.add(zombie);

zombies.push(zombie);

}

for(let i=0;i<20;i++){
createZombie();
}


// controls

let player=godBody;

document.addEventListener("keydown",(e)=>{

let speed=1;

if(e.key=="w")player.position.z-=speed;
if(e.key=="s")player.position.z+=speed;
if(e.key=="a")player.position.x-=speed;
if(e.key=="d")player.position.x+=speed;

});


// zombie AI

function moveZombies(){

zombies.forEach(z=>{

let dx=player.position.x-z.position.x;
let dz=player.position.z-z.position.z;

z.position.x+=dx*0.002;
z.position.z+=dz*0.002;

});

}


function animate(){

requestAnimationFrame(animate);

moveZombies();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
